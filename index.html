<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Added black border to buttons as per previous request */
        .contact-btn { 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 2px solid #000000;
        }
        .contact-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* Updated wave background to FedEx Purple */
        .wave-background { background-color: #ffffff; position: relative; overflow: hidden; z-index: 1; border-bottom: 5px solid #4D148C; }
        .graph-pattern-background { background-color: #ffffff; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        
        .strip-decoration { position: absolute; width: 450px; height: 10px; background-color: #FF6600; transform: rotate(-45deg); opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .strip-ur-1 { top: -100px; right: -150px; z-index: 0; } 
        .strip-ur-2 { top: -60px; right: -110px; z-index: 0; } 
        .strip-ll-1 { bottom: -100px; left: -150px; z-index: 5; } 
        .strip-ll-2 { bottom: -60px; left: -110px; z-index: 5; }
        
        /* Custom Theme Color Class (FedEx Purple) */
        .bg-theme { background-color: #4D148C; }
        .text-theme { color: #4D148C; }
        .border-theme { border-color: #4D148C; }
        .focus-ring-theme:focus { --tw-ring-color: #4D148C; }

        .icon-facebook { background-color: #1877F2; color: white; }
        .icon-linkedin { background-color: #0A66C2; color: white; }
        .icon-telegram { background-color: #26A5E4; color: white; }
        .icon-whatsapp { background-color: #25D366; color: white; } 
        .icon-tiktok { background-color: #000000; color: white; } 
        .icon-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #405ded 90%); color: white; } 
        
        .static-watermark { opacity: 0.15; width: 85%; height: 85%; filter: grayscale(100%); }
        
        .hidden-view { display: none !important; }
        
        #syncStatus { position: fixed; bottom: 10px; right: 10px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 1000; }
        .status-online { background: #dcfce7; color: #166534; border: 1px solid #166534; }
        .status-offline { background: #fee2e2; color: #991b1b; border: 1px solid #991b1b; }

        #loadingOverlay { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        
        .upload-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 2px solid #e5e7eb; background: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 flex flex-col items-center py-8 px-4">

    <!-- Admin Access Trigger -->

    <!-- Login View -->

        </div>

    <!-- Editor View -->
    <div id="editView" class="hidden-view max-w-4xl w-full bg-white p-8 rounded-3xl shadow-2xl my-8 overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">Admin Dashboard</h2>
            <button onclick="window.toggleView('card')" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <h3 class="font-bold text-theme border-b pb-1">Media Assets</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2">Profile Picture</label>

                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2">Company Logo</label>
                        <div class="flex items-center gap-4 p-3 border rounded-xl bg-gray-50">
                            <img id="editLogoPreview" src="" class="upload-preview" alt="Preview">
                            <div class="flex-1">
                                <input type="file" id="uploadLogo" accept="image/*" class="hidden">
                                <button onclick="document.getElementById('uploadLogo').click()" class="text-xs bg-theme text-white px-3 py-2 rounded-lg font-bold border border-black">Upload Logo</button>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="font-bold text-theme border-b pb-1">Profile Info</h3>
                <div class="space-y-3">
                    <input type="text" id="editName" placeholder="Full Name" class="w-full p-2 border rounded">
                    <input type="text" id="editOrg" placeholder="Organization" class="w-full p-2 border rounded">
                    <input type="text" id="editTitle" placeholder="Job Title" class="w-full p-2 border rounded">
                    <textarea id="editBio" placeholder="Bio / Slogan" class="w-full p-2 border rounded h-20 text-sm"></textarea>
                    <input type="email" id="editEmail" placeholder="Primary Email Address" class="w-full p-2 border rounded">
                    <input type="text" id="editWebsite" placeholder="Website URL" class="w-full p-2 border rounded">
                    <input type="text" id="editLocation" placeholder="Google Maps URL" class="w-full p-2 border rounded">
                </div>

                <h3 class="font-bold text-red-600 border-b pb-1 mt-6">Security</h3>
                <div class="space-y-3 p-3 bg-red-50 rounded-xl border border-red-100">
                    <label class="block text-[10px] font-bold uppercase text-red-400">Admin Password</label>
                    <div class="relative">
                        <input type="password" id="editPassword" placeholder="New Password" class="w-full p-2 border rounded focus:ring-2 focus:ring-red-500 outline-none">
                        <button type="button" onclick="const p = document.getElementById('editPassword'); p.type = p.type === 'password' ? 'text' : 'password';" class="absolute right-2 top-2 text-gray-400">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-theme">Phones</h3>
                        <button id="addPhone" class="text-theme text-xs font-bold">+ ADD</button>
                    </div>
                    <div id="phonesEditor" class="space-y-2"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-theme">Socials</h3>
                        <button id="addSocial" class="text-theme text-xs font-bold">+ ADD</button>
                    </div>
                    <div id="socialsEditor" class="space-y-2"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center border-b pb-1 mb-3">
                        <h3 class="font-bold text-theme">Custom Links</h3>
                        <button id="addCustomLink" class="text-theme text-xs font-bold">+ ADD LINK</button>
                    </div>
                    <div id="customLinksEditor" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <button id="saveEdit" class="w-full bg-theme text-white py-4 rounded-xl font-bold mt-8 shadow-xl hover:opacity-90 transition-all border-2 border-black">
            Publish Changes Globally
        </button>
    </div>

    <!-- Main Card View -->
    <div id="cardView" class="w-full flex flex-col items-center">
        <div id="id-card-content" class="graph-pattern-background max-w-sm w-full mx-auto p-4 md:p-6 rounded-3xl border-2 border-gray-200 shadow-2xl relative overflow-hidden mb-6">
            <div class="wave-background absolute top-0 left-0 right-0 h-64 -mt-2 -mx-1 rounded-t-[1.5rem]">
                <div class="absolute top-0 left-0 w-full h-full flex justify-center items-center p-4">
                    <img id="companyLogo" src="https://i.ibb.co/kgKpKq19/Dentist-Zerubabel-Mulugeta-20260324-123121-0000.png" alt="FedEx Logo" class="w-full h-full object-contain">
                </div>
            </div>
            
            <!-- Static Watermark -->
            <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center" style="top: 25%;">
                <img src="https://i.ibb.co/ym404nTr/No-BG-Lomi.png" alt="Watermark" class="static-watermark object-contain">
            </div>

            <div class="strip-decoration strip-ur-1"></div><div class="strip-decoration strip-ur-2"></div>
            <div class="strip-decoration strip-ll-1"></div><div class="strip-decoration strip-ll-2"></div>

            <div class="relative z-10 pt-40"> 
                <div class="text-center mb-6"> 
                    <div class="relative w-32 h-32 mx-auto rounded-full border-4 border-white shadow-xl overflow-hidden bg-white">
                        <img id="profilePicture" src="https://i.ibb.co/845QShrQ/5908740101892672933.jpg" alt="Woldeamanuel Jemaneh" class="w-full h-full object-cover">
                    </div>
                    <h1 id="display-name" class="text-xl font-extrabold text-gray-900 mt-4">Woldeamanuel Jemaneh</h1>
                    <p id="display-org" class="text-lg font-bold text-theme">FedEx</p>
                    <p id="display-title" class="text-md font-semibold text-gray-800">Commercial Director</p>
                    <p id="display-bio" class="text-sm font-medium text-gray-600 italic mt-2 px-4"></p>
                </div>

                <div class="mt-4 border-t border-b py-4">
                    <div id="social-container" class="flex flex-wrap justify-center gap-3"></div>
                </div>

                <div id="custom-links-container" class="mt-4 flex flex-col gap-2"></div>

                <div id="phone-buttons-container" class="space-y-3 mt-6"></div>
                
                <div id="contact-buttons-container" class="space-y-3 mt-3">
                    <a id="display-email-1" href="mailto:amanuelj80@gmail.com" class="contact-btn flex items-center justify-center p-3 bg-white text-gray-800 font-semibold rounded-lg">
                        <i data-lucide="mail" class="w-5 h-5 mr-2"></i>Email 1
                    </a>
                    <a id="display-email-2" href="mailto:Woldeamanuel.jemaneh@aau.edu.et" class="contact-btn flex items-center justify-center p-3 bg-white text-gray-800 font-semibold rounded-lg">
                        <i data-lucide="mail" class="w-5 h-5 mr-2"></i>Email 2
                    </a>
                </div>

                <div class="mt-6 flex gap-2">
                    <a href="#" target="_blank" id="btn-website" class="flex-1 hidden items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold border border-black hover:bg-gray-200 transition-colors"><i data-lucide="globe" class="w-4 h-4 mr-2"></i>Website</a>
                    <a href="#" target="_blank" id="btn-location" class="flex-1 hidden items-center justify-center p-3 bg-gray-100 rounded-lg text-sm font-bold border border-black hover:bg-gray-200 transition-colors"><i data-lucide="map-pin" class="w-4 h-4 mr-2"></i>Location</a>
                </div>

                <div class="mt-8 space-y-3">
                    <button id="downloadButton" class="w-full flex items-center justify-center p-4 bg-theme text-white font-bold rounded-xl shadow-lg border-2 border-black hover:opacity-90 transition-opacity">Download Card Image</button>
                    <button id="vcfButton" class="w-full flex items-center justify-center p-4 bg-black text-white font-bold rounded-xl shadow-lg border-2 border-white">Add to Contacts</button>
                </div>
            </div> 
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC1LJ2wrM_Qmx9E_2xPmzybRXVPwJCnx3s",
            authDomain: "mylomismartcard1.firebaseapp.com",
            databaseURL: "https://mylomismartcard1-default-rtdb.firebaseio.com",
            projectId: "mylomismartcard1",
            storageBucket: "mylomismartcard1.firebasestorage.app",
            messagingSenderId: "193639141242",
            appId: "1:193639141242:web:08dd9d02e5a320d0b7d0c3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let CONTACT_DATA = {
            adminPassword: "Admin",
            name: "Woldeamanuel Jemaneh",
            organization: "FedEx", 
            title: "Commercial Director",
            bio: "",
            image: "https://i.ibb.co/845QShrQ/5908740101892672933.jpg",
            logo: "https://i.ibb.co/kgKpKq19/Dentist-Zerubabel-Mulugeta-20260324-123121-0000.png",
            phones: ["+251931152541"],
            email: "amanuelj80@gmail.com",
            email2: "Woldeamanuel.jemaneh@aau.edu.et",
            website: "",
            location: "",
            socialLinks: [
                { platform: 'whatsapp', url: 'https://wa.me/251931152541' },
                { platform: 'instagram', url: 'https://www.instagram.com/amaniuel_j?igsh=MWlpbXplbDcyYXZzOA==' },
                { platform: 'linkedin', url: 'https://www.linkedin.com/in/woldeamanuel-jemaneh?utm_source=share_via&utm_content=profile&utm_medium=member_android' }
            ],
            customLinks: []
        };

        const PLATFORMS = {
            linkedin: { label: 'LinkedIn', icon: 'fa-linkedin', class: 'icon-linkedin' },
            instagram: { label: 'Instagram', icon: 'fa-instagram', class: 'icon-instagram' },
            facebook: { label: 'Facebook', icon: 'fa-facebook', class: 'icon-facebook' },
            tiktok: { label: 'TikTok', icon: 'fa-tiktok', class: 'icon-tiktok' },
            telegram: { label: 'Telegram', icon: 'fa-telegram', class: 'icon-telegram' },
            whatsapp: { label: 'WhatsApp', icon: 'fa-whatsapp', class: 'icon-whatsapp' }
        };

        let authReady = false;

        async function runAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (customTokenError) {
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Error:", err); }
        }

        onAuthStateChanged(auth, (user) => {
            const status = document.getElementById('syncStatus');
            if (user) {
                authReady = true;
                status.textContent = "SYNC: CONNECTED";
                status.className = "status-online";
                setupDataSync();
            } else {
                authReady = false;
                status.textContent = "SYNC: OFFLINE";
                status.className = "status-offline";
            }
        });

        function getProfileDocRef() {
            return doc(db, 'artifacts', appId, 'public', 'data', 'profiles', 'default');
        }

        function setupDataSync() {
            if (!authReady) return;
            const docRef = getProfileDocRef();
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    CONTACT_DATA = { ...CONTACT_DATA, ...snap.data() };
                    updateUI();
                } else {
                    setDoc(docRef, CONTACT_DATA).catch(e => console.error("Init save fail:", e));
                }
            }, (err) => { console.error("Sync Error:", err); });
        }

        function updateUI() {
            document.getElementById('display-name').textContent = CONTACT_DATA.name;
            document.getElementById('display-org').textContent = CONTACT_DATA.organization;
            document.getElementById('display-title').textContent = CONTACT_DATA.title;
            document.getElementById('display-bio').textContent = CONTACT_DATA.bio || "";
            document.getElementById('profilePicture').src = CONTACT_DATA.image;
            document.getElementById('companyLogo').src = CONTACT_DATA.logo || "";
            
            const webBtn = document.getElementById('btn-website');
            if (CONTACT_DATA.website) {
                webBtn.href = CONTACT_DATA.website;
                webBtn.classList.remove('hidden');
                webBtn.classList.add('flex');
            } else {
                webBtn.classList.add('hidden');
            }

            const locBtn = document.getElementById('btn-location');
            if (CONTACT_DATA.location) {
                locBtn.href = CONTACT_DATA.location;
                locBtn.classList.remove('hidden');
                locBtn.classList.add('flex');
            } else {
                locBtn.classList.add('hidden');
            }
            
            const pContainer = document.getElementById('phone-buttons-container');
            pContainer.innerHTML = (CONTACT_DATA.phones || []).map(num => `
                <a href="tel:${num}" class="contact-btn flex items-center justify-center p-3 bg-theme text-white font-semibold rounded-lg">
                    <i data-lucide="phone" class="w-5 h-5 mr-2"></i>Call: ${num}
                </a>
            `).join('');

            const sContainer = document.getElementById('social-container');
            sContainer.innerHTML = (CONTACT_DATA.socialLinks || []).map(s => {
                const p = PLATFORMS[s.platform];
                if (!p) return "";
                /* Removed border border-black from the social icons as requested */
                return `<a href="${s.url}" target="_blank" class="w-10 h-10 flex items-center justify-center rounded-full shadow-md ${p.class} transform hover:scale-110 transition-transform"><i class="fa-brands ${p.icon} text-xl"></i></a>`;
            }).join('');

            lucide.createIcons();
        }

        window.toggleView = (v) => {
            ['cardView', 'loginView', 'editView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
            const target = document.getElementById(v + 'View');
            if (target) target.classList.remove('hidden-view');
        };

        document.getElementById('authBtn').onclick = () => window.toggleView('login');
        document.getElementById('doLogin').onclick = () => {
            if (document.getElementById('loginPass').value === CONTACT_DATA.adminPassword) {
                window.toggleView('edit');
            } else alert("Wrong password");
        };

        document.getElementById('downloadButton').onclick = () => {
            const element = document.getElementById('id-card-content');
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
                const l = document.createElement('a');
                l.download = `FedEx_Card_Woldeamanuel.png`;
                l.href = canvas.toDataURL('image/png');
                l.click();
            });
        };

        document.getElementById('vcfButton').onclick = () => {
            let v = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_DATA.name}\nORG:${CONTACT_DATA.organization}\nTITLE:${CONTACT_DATA.title}\n`;
            (CONTACT_DATA.phones || []).forEach(p => v += `TEL;TYPE=CELL:${p}\n`);
            v += `EMAIL;TYPE=PREF,INTERNET:${CONTACT_DATA.email}\n`;
            if(CONTACT_DATA.email2) v += `EMAIL;TYPE=INTERNET:${CONTACT_DATA.email2}\n`;
            v += `END:VCARD`;
            const b = new Blob([v], { type: 'text/vcard' });
            const l = document.createElement('a');
            l.href = URL.createObjectURL(b);
            l.download = `${CONTACT_DATA.name.replace(/\s+/g, '_')}.vcf`;
            l.click();
        };

        updateUI();
        runAuth();
    </script>
</body>
</html>
